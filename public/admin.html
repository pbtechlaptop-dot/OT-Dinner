<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>後台管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pbnavy: '#0f2f57',
            pborange: '#f58220'
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <main class="mx-auto max-w-6xl px-4 py-4">
    <header class="mb-4 rounded-xl bg-pbnavy p-4 text-white">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h1 class="text-2xl font-bold">後台管理</h1>
          <p class="text-sm text-white/80">管理餐廳、菜單、飲品、部門、人員</p>
        </div>
        <a href="/" class="rounded-md bg-white/15 px-3 py-2 text-sm font-semibold hover:bg-white/25">返回前台</a>
      </div>
    </header>

    <section class="mb-3 rounded-xl border border-slate-200 bg-white p-4">
      <div class="grid grid-cols-1 gap-2 md:grid-cols-[220px_auto_auto_auto]">
        <input id="adminPassword" type="password" placeholder="管理密碼" class="rounded-md border border-slate-300 px-3 py-2 text-sm" />
        <button id="loadBtn" class="rounded-md bg-pbnavy px-3 py-2 text-sm font-semibold text-white hover:bg-blue-900">載入資料</button>
        <button id="saveBtn" class="rounded-md bg-pborange px-3 py-2 text-sm font-semibold text-white hover:bg-orange-600">儲存全部</button>
        <button id="resetDayBtn" class="rounded-md bg-red-600 px-3 py-2 text-sm font-semibold text-white hover:bg-red-700">重置今日訂單</button>
      </div>
      <p id="status" class="mt-2 text-sm text-slate-500">請先輸入管理密碼並載入資料。</p>
    </section>

    <section class="mb-3 rounded-xl border border-slate-200 bg-white p-4">
      <h2 class="mb-2 text-lg font-bold text-pbnavy">1) 餐廳</h2>
      <div class="mb-2 flex flex-wrap gap-2" id="restaurantList"></div>
      <div class="flex gap-2">
        <input id="newRestaurant" placeholder="新增餐廳名稱" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
        <button id="addRestaurantBtn" class="rounded-md bg-pbnavy px-3 py-2 text-sm font-semibold text-white">新增</button>
      </div>
    </section>

    <section class="mb-3 rounded-xl border border-slate-200 bg-white p-4">
      <h2 class="mb-2 text-lg font-bold text-pbnavy">2) 飲品</h2>
      <div class="overflow-x-auto rounded border border-slate-200">
        <table class="min-w-full text-sm" id="drinkTable"></table>
      </div>
      <div class="mt-2 grid grid-cols-1 gap-2 md:grid-cols-4">
        <input id="drinkTc" placeholder="繁體" class="rounded-md border border-slate-300 px-3 py-2" />
        <input id="drinkSc" placeholder="簡體" class="rounded-md border border-slate-300 px-3 py-2" />
        <input id="drinkEn" placeholder="English" class="rounded-md border border-slate-300 px-3 py-2" />
        <button id="addDrinkBtn" class="rounded-md bg-pbnavy px-3 py-2 text-white">新增飲品</button>
      </div>
    </section>

    <section class="mb-3 rounded-xl border border-slate-200 bg-white p-4">
      <h2 class="mb-2 text-lg font-bold text-pbnavy">3) 部門與人員</h2>
      <div class="grid grid-cols-1 gap-3 md:grid-cols-[220px_1fr]">
        <div>
          <select id="deptSelect" class="mb-2 w-full rounded-md border border-slate-300 px-3 py-2"></select>
          <div class="flex gap-2">
            <input id="newDept" placeholder="新增部門" class="w-full rounded-md border border-slate-300 px-3 py-2" />
            <button id="addDeptBtn" class="rounded-md bg-pbnavy px-3 py-2 text-white">+部門</button>
          </div>
          <button id="removeDeptBtn" class="mt-2 w-full rounded-md bg-red-600 px-3 py-2 text-white">刪除部門</button>
        </div>
        <div>
          <div id="staffList" class="mb-2 flex flex-wrap gap-2"></div>
          <div class="flex gap-2">
            <input id="newStaff" placeholder="新增人員" class="w-full rounded-md border border-slate-300 px-3 py-2" />
            <button id="addStaffBtn" class="rounded-md bg-pbnavy px-3 py-2 text-white">新增人員</button>
          </div>
        </div>
      </div>
    </section>

    <section class="rounded-xl border border-slate-200 bg-white p-4">
      <h2 class="mb-2 text-lg font-bold text-pbnavy">4) 菜單</h2>
      <div class="mb-2 grid grid-cols-1 gap-2 md:grid-cols-3">
        <select id="menuRestaurantSelect" class="rounded-md border border-slate-300 px-3 py-2"></select>
        <select id="menuCategorySelect" class="rounded-md border border-slate-300 px-3 py-2"></select>
        <div class="flex gap-2">
          <input id="newCategory" placeholder="新增分類" class="w-full rounded-md border border-slate-300 px-3 py-2" />
          <button id="addCategoryBtn" class="rounded-md bg-pbnavy px-3 py-2 text-white">新增分類</button>
        </div>
      </div>

      <div class="overflow-x-auto rounded border border-slate-200">
        <table class="min-w-full text-sm" id="menuTable"></table>
      </div>

      <div class="mt-2 grid grid-cols-1 gap-2 md:grid-cols-5">
        <input id="menuTc" placeholder="菜名(繁)" class="rounded-md border border-slate-300 px-3 py-2" />
        <input id="menuSc" placeholder="菜名(簡)" class="rounded-md border border-slate-300 px-3 py-2" />
        <input id="menuEn" placeholder="Name(EN)" class="rounded-md border border-slate-300 px-3 py-2" />
        <input id="menuPrice" type="number" step="0.01" min="0" placeholder="價錢" class="rounded-md border border-slate-300 px-3 py-2" />
        <button id="addMenuBtn" class="rounded-md bg-pbnavy px-3 py-2 text-white">新增餐點</button>
      </div>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
