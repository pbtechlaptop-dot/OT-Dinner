<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>加班 Order 飯系統</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <h1 data-i18n="appTitle">加班 Order 飯系統</h1>
        <p id="dateText">日期：--</p>
      </div>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <button class="btn btn-ghost" id="langTc" type="button">繁中</button>
        <button class="btn btn-ghost" id="langSc" type="button">简中</button>
        <button class="btn btn-ghost" id="langEn" type="button">EN</button>
        <a class="btn btn-ghost" href="/api/export/csv" data-i18n="exportCsv">匯出 CSV</a>
        <button class="btn btn-ghost" id="exportXlsxBtn" type="button" data-i18n="exportExcel">匯出 XLSX</button>
      </div>
    </header>

    <section class="card">
      <h2 data-i18n="secRestaurant">1) 今日餐廳</h2>
      <div class="row">
        <select id="restaurantSelect"></select>
        <button class="btn" id="setRestaurantBtn" data-i18n="setRestaurant">設定餐廳</button>
      </div>
      <div class="row mt8">
        <button class="btn btn-danger" id="forceChangeBtn" data-i18n="forceChange">改餐廳並清單</button>
      </div>
      <p class="muted" id="currentRestaurantText">目前：未設定</p>
    </section>

    <section class="card">
      <h2 data-i18n="secOrder">2) 填寫訂單</h2>
      <form id="orderForm" class="grid">
        <label>
          <span data-i18n="dept">部門</span>
          <select id="deptSelect" required></select>
        </label>
        <label>
          <span data-i18n="name">同事</span>
          <select id="nameSelect" required></select>
        </label>
        <label>
          <span data-i18n="category">分類</span>
          <select id="categorySelect" required></select>
        </label>
        <label>
          <span data-i18n="food">餐點</span>
          <select id="foodSelect" required></select>
        </label>
        <label>
          <span data-i18n="price">價錢</span>
          <input id="priceInput" type="number" step="0.01" min="0" required />
        </label>
        <label>
          <span data-i18n="drink">飲品</span>
          <select id="drinkSelect"></select>
        </label>
        <label class="wide">
          <span data-i18n="addon">加配</span>
          <input id="addonInput" type="text" data-i18n-placeholder="addonHint" placeholder="例如：走蔥、加飯" />
        </label>
        <button class="btn wide" type="submit" data-i18n="submitOrder">提交訂單</button>
      </form>
    </section>

    <section class="card">
      <h2 data-i18n="secOrders">3) 今日訂單</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th data-i18n="dept">部門</th>
              <th data-i18n="name">同事</th>
              <th data-i18n="food">餐點</th>
              <th data-i18n="addon">加配</th>
              <th data-i18n="drink">飲品</th>
              <th data-i18n="price">價錢</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
          <tfoot>
            <tr>
              <td colspan="6" data-i18n="total">總計</td>
              <td id="totalPrice">0</td>
            </tr>
          </tfoot>
        </table>
      </div>
      <div id="drinkSummary" class="summary"></div>
    </section>

    <section class="card">
      <h2 data-i18n="secImport">4) 匯入資料 (Excel/CSV/JSON)</h2>
      <div class="row">
        <input id="importFile" type="file" accept=".xlsx,.xls,.csv,.json" />
        <button class="btn" id="importBtn" type="button" data-i18n="importData">匯入覆蓋資料</button>
      </div>
      <p class="muted" data-i18n="importHint">Excel/CSV 標題欄需包含：type, restaurant, category, item, price, dept, name, drink</p>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
